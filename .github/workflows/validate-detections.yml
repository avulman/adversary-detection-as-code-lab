name: Validate Detection Repo

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: py -m pip install pyyaml requests

      - name: Run repository validation
        run: py scripts\validate_repo.py

      - name: Run detection syntax validation
        env:
          SPLUNK_BASE_URL: ${{ secrets.SPLUNK_BASE_URL }}
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
        run: py scripts\validate_detection_syntax.py

      - name: Run local Splunk detection true-positive tests
        run: py scripts\test_splunk_detections.py