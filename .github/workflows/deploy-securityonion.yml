name: Validate and Deploy Security Onion Detections

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: securityonion-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-deploy-securityonion:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: py -m pip install playwright

      - name: Install Playwright browser
        run: py -m playwright install chromium

      - name: Validate repository
        run: py scripts\validate_repo.py

      - name: Deploy Security Onion detections via UI automation
        env:
          SO_UI_URL: ${{ secrets.SO_UI_URL }}
          SO_UI_USERNAME: ${{ secrets.SO_UI_USERNAME }}
          SO_UI_PASSWORD: ${{ secrets.SO_UI_PASSWORD }}
        run: py scripts\deploy_to_securityonion.py

      - name: Commit updated Security Onion state file
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/securityonion_rule_state.json

          $changes = git diff --cached --name-only
          if (-not $changes) {
            Write-Host "No state file changes to commit."
            exit 0
          }

          git commit -m "chore(state): update Security Onion rule state [skip ci]"
          git push origin HEAD:${{ github.ref_name }}