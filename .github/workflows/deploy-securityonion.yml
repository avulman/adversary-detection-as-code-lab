name: Validate and Deploy Security Onion Detections

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate-and-deploy-securityonion:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: py -m pip install paramiko playwright

      - name: Install Playwright browser
        run: py -m playwright install chromium

      - name: Validate repository
        run: py scripts\validate_repo.py

      - name: Deploy Security Onion detections via UI automation
        env:
          SO_MANAGER_HOST: ${{ secrets.SO_MANAGER_HOST }}
          SO_MANAGER_PORT: ${{ secrets.SO_MANAGER_PORT }}
          SO_MANAGER_USER: ${{ secrets.SO_MANAGER_USER }}
          SO_MANAGER_SSH_KEY: ${{ secrets.SO_MANAGER_SSH_KEY }}
          SO_UI_URL: ${{ secrets.SO_UI_URL }}
          SO_UI_USERNAME: ${{ secrets.SO_UI_USERNAME }}
          SO_UI_PASSWORD: ${{ secrets.SO_UI_PASSWORD }}
        run: py scripts\deploy_to_securityonion.py